<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник давления</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f5f5f5;
            padding: 16px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #2196F3;
            color: white;
            text-align: center;
        }

        .btn-secondary {
            background: #9E9E9E;
        }

        .btn-danger {
            background: #f44336;
        }

        .list-item {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
        }

        .list-item .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .list-item .date {
            font-weight: bold;
            font-size: 16px;
        }

        .list-item .time {
            font-size: 14px;
            color: #666;
            margin-left: 8px;
        }

        .list-item .pressure {
            font-size: 18px;
            font-weight: bold;
        }

        .list-item .pulse {
            font-size: 16px;
            color: #555;
            margin-left: 12px;
        }

        .list-item .note {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        .modal-content input,
        .modal-content select,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 4px;
        }

        .modal-content .row-fields {
            display: flex;
            gap: 10px;
        }

        .modal-content .row-fields>div {
            flex: 1;
        }

        .modal-btns {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-btns button {
            flex: 1;
        }

        .chart-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 250px !important;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px 0;
        }

        .delete-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>❤️ Давление</h1>
        </div>

        <div class="btn-group">
            <button class="btn" id="addBtn">➕ Добавить</button>
            <button class="btn btn-secondary" id="chartToggle">📊 График</button>
        </div>

        <div id="listContainer"></div>

        <div class="chart-container" id="chartContainer">
            <canvas id="pressureChart"></canvas>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Добавить запись</h3>
            <label>Дата</label>
            <input type="date" id="inputDate">

            <label>Время суток</label>
            <select id="inputTime">
                <option value="утро">Утро</option>
                <option value="вечер">Вечер</option>
            </select>

            <label>Давление (сист./диаст.)</label>
            <div class="row-fields">
                <div><input type="number" id="inputSys" placeholder="120" min="70" max="250"></div>
                <div><input type="number" id="inputDia" placeholder="80" min="40" max="160"></div>
            </div>

            <label>Пульс (уд/мин)</label>
            <input type="number" id="inputPulse" placeholder="70" min="30" max="200">

            <label>Примечания</label>
            <textarea id="inputNote" rows="2" placeholder="Самочувствие, приём лекарств..."></textarea>

            <div class="modal-btns">
                <button class="btn" id="saveBtn">Сохранить</button>
                <button class="btn btn-secondary" id="cancelBtn">Отмена</button>
                <button class="btn btn-danger" id="deleteBtn" style="display:none;">Удалить</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ===== ДАННЫЕ =====
        const STORAGE_KEY = 'pressureEntries';
        let entries = [];
        let editingId = null;

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            entries = stored ? JSON.parse(stored) : [];
        }

        function saveEntries() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        }

        // ===== ОТОБРАЖЕНИЕ =====
        function render() {
            const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
            const container = document.getElementById('listContainer');
            if (sorted.length === 0) {
                container.innerHTML = '<div class="empty">Нет записей. Добавьте первую!</div>';
                return;
            }

            let html = '';
            for (const entry of sorted) {
                html += `
                <div class="list-item" data-id="${entry.id}">
                    <div class="row">
                        <span>
                            <span class="date">${entry.date}</span>
                            <span class="time">${entry.time}</span>
                        </span>
                        <span>
                            <span class="pressure">${entry.sys}/${entry.dia}</span>
                            <span class="pulse">❤️ ${entry.pulse}</span>
                            <button class="delete-btn" onclick="deleteEntry(${entry.id})">✕</button>
                        </span>
                    </div>
                    ${entry.note ? `<div class="note">${entry.note}</div>` : ''}
                </div>
            `;
            }
            container.innerHTML = html;

            updateChart();
        }

        // ===== ГРАФИК =====
        let chartInstance = null;
        function updateChart() {
            const ctx = document.getElementById('pressureChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
            if (sorted.length === 0) {
                document.getElementById('chartContainer').style.display = 'none';
                return;
            }

            const labels = sorted.map(e => e.date + ' ' + e.time);
            const sysData = sorted.map(e => e.sys);
            const diaData = sorted.map(e => e.dia);
            const pulseData = sorted.map(e => e.pulse);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Систолическое', data: sysData, borderColor: 'red', backgroundColor: 'rgba(255,0,0,0.1)', tension: 0.2, fill: true, pointRadius: 4 },
                        { label: 'Диастолическое', data: diaData, borderColor: 'blue', backgroundColor: 'rgba(0,0,255,0.1)', tension: 0.2, fill: true, pointRadius: 4 },
                        { label: 'Пульс', data: pulseData, borderColor: 'green', borderDash: [4, 4], fill: false, pointRadius: 3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: true } },
                    scales: { y: { beginAtZero: false } }
                }
            });
            document.getElementById('chartContainer').style.display = 'block';
        }

        // ===== МОДАЛЬНОЕ ОКНО =====
        function showModal(entry = null) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const inputDate = document.getElementById('inputDate');
            const inputTime = document.getElementById('inputTime');
            const inputSys = document.getElementById('inputSys');
            const inputDia = document.getElementById('inputDia');
            const inputPulse = document.getElementById('inputPulse');
            const inputNote = document.getElementById('inputNote');
            const deleteBtn = document.getElementById('deleteBtn');

            if (entry) {
                title.textContent = 'Редактировать запись';
                inputDate.value = entry.date;
                inputTime.value = entry.time;
                inputSys.value = entry.sys;
                inputDia.value = entry.dia;
                inputPulse.value = entry.pulse;
                inputNote.value = entry.note || '';
                deleteBtn.style.display = 'block';
                editingId = entry.id;
            } else {
                title.textContent = 'Добавить запись';
                const today = new Date().toISOString().split('T')[0];
                inputDate.value = today;
                inputTime.value = 'утро';
                inputSys.value = '';
                inputDia.value = '';
                inputPulse.value = '';
                inputNote.value = '';
                deleteBtn.style.display = 'none';
                editingId = null;
            }
            modal.classList.add('show');
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('show');
            editingId = null;
        }

        function saveModal() {
            const date = document.getElementById('inputDate').value;
            const time = document.getElementById('inputTime').value;
            const sys = parseInt(document.getElementById('inputSys').value);
            const dia = parseInt(document.getElementById('inputDia').value);
            const pulse = parseInt(document.getElementById('inputPulse').value);
            const note = document.getElementById('inputNote').value.trim();

            if (!date || isNaN(sys) || isNaN(dia) || isNaN(pulse) || sys <= 0 || dia <= 0 || pulse <= 0) {
                alert('Заполните все поля корректно (числа больше 0)');
                return;
            }
            if (sys <= dia) {
                alert('Систолическое давление должно быть больше диастолического');
                return;
            }

            if (editingId !== null) {
                const index = entries.findIndex(e => e.id === editingId);
                if (index !== -1) {
                    entries[index] = { ...entries[index], date, time, sys, dia, pulse, note };
                }
            } else {
                const newEntry = {
                    id: Date.now(),
                    date, time, sys, dia, pulse, note
                };
                entries.push(newEntry);
            }
            saveEntries();
            render();
            hideModal();
        }

        function deleteEntry(id) {
            if (confirm('Удалить запись?')) {
                entries = entries.filter(e => e.id !== id);
                saveEntries();
                render();
            }
        }

        // ===== СОБЫТИЯ =====
        document.getElementById('addBtn').addEventListener('click', () => showModal(null));
        document.getElementById('saveBtn').addEventListener('click', saveModal);
        document.getElementById('cancelBtn').addEventListener('click', hideModal);
        document.getElementById('deleteBtn').addEventListener('click', function () {
            if (editingId !== null) {
                if (confirm('Удалить запись?')) {
                    entries = entries.filter(e => e.id !== editingId);
                    saveEntries();
                    render();
                    hideModal();
                }
            }
        });

        document.getElementById('chartToggle').addEventListener('click', function () {
            const container = document.getElementById('chartContainer');
            if (container.style.display === 'none' || container.style.display === '') {
                if (entries.length > 0) {
                    container.style.display = 'block';
                    updateChart();
                } else {
                    alert('Нет данных для графика');
                }
            } else {
                container.style.display = 'none';
            }
        });

        // Инициализация
        loadData();
        render();
    </script>
</body>

</html>
