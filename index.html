<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дневник давления</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f5f5f5; padding: 16px; padding-bottom: 80px; }
        .container { max-width: 650px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .header h1 { font-size: 22px; font-weight: bold; }
        .add-btn { background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 30px; font-size: 16px; cursor: pointer; }

        .table-wrap {
            background: white;
            border-radius: 12px;
            overflow: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 500px;
        }
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        th {
            background: #e3f2fd;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        th.group-header {
            text-align: center;
            background: #bbdefb;
            font-weight: 700;
        }
        .date { font-weight: 600; white-space: nowrap; }
        .pressure { font-weight: 500; }
        .pulse { color: #555; }
        .note { color: #777; font-size: 13px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: nowrap; }
        .actions button {
            background: none; border: none; font-size: 16px; cursor: pointer; padding: 0 4px;
        }
        .actions .edit { color: #2196F3; }
        .actions .del { color: #f44336; }

        .empty { text-align: center; color: #999; padding: 30px 0; }

        /* Модалка */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white; padding: 24px; border-radius: 16px; width: 94%; max-width: 420px;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-content label { display: block; font-weight: 600; margin-top: 12px; font-size: 14px; }
        .modal-content input, .modal-content textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-top: 4px;
        }
        .modal-content .row2 { display: flex; gap: 12px; }
        .modal-content .row2 > div { flex: 1; }
        .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #2196F3; color: white; }
        .btn-cancel { background: #9E9E9E; color: white; }
        .btn-delete { background: #f44336; color: white; display: none; }

        /* для мобильных */
        @media (max-width: 500px) {
            th, td { padding: 8px 4px; font-size: 13px; }
            .note { max-width: 80px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>❤️ Давление</h1>
        <button class="add-btn" id="addBtn">+ Добавить</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="min-width:90px;">Дата</th>
                    <th class="group-header" colspan="2">Уровень АД</th>
                    <th style="min-width:60px;">Пульс</th>
                    <th style="min-width:100px;">Примечания</th>
                    <th style="width:60px;"></th>
                </tr>
                <tr>
                    <th></th>
                    <th>Утро</th>
                    <th>Вечер</th>
                    <th></th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- строки будут вставляться сюда -->
            </tbody>
        </table>
    </div>
</div>

<!-- Модалка -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Добавить запись</h3>
        <label>Дата</label>
        <input type="date" id="inputDate">

        <div class="row2">
            <div>
                <label>Утро (сист/диаст)</label>
                <input type="text" id="inputMorning" placeholder="120/80">
            </div>
            <div>
                <label>Вечер (сист/диаст)</label>
                <input type="text" id="inputEvening" placeholder="130/85">
            </div>
        </div>

        <label>Пульс (уд/мин)</label>
        <input type="number" id="inputPulse" placeholder="70">

        <label>Примечания</label>
        <textarea id="inputNote" rows="2" placeholder="Самочувствие, лекарства..."></textarea>

        <div class="modal-btns">
            <button class="btn-save" id="saveBtn">Сохранить</button>
            <button class="btn-cancel" id="cancelBtn">Отмена</button>
            <button class="btn-delete" id="deleteBtn">Удалить</button>
        </div>
    </div>
</div>

<script>
    // ----- Хранилище -----
    const STORAGE_KEY = 'pressureTable';
    let entries = [];
    let editingId = null;

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        entries = stored ? JSON.parse(stored) : [];
    }
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    // ----- Отображение -----
    function render() {
        const tbody = document.getElementById('tableBody');
        if (entries.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="empty">Нет записей. Нажмите «+ Добавить»</td></tr>`;
            return;
        }
        // сортировка по дате (новые сверху)
        const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));

        let html = '';
        for (const entry of sorted) {
            html += `
                <tr data-id="${entry.id}">
                    <td class="date">${entry.date}</td>
                    <td class="pressure">${entry.morning || '—'}</td>
                    <td class="pressure">${entry.evening || '—'}</td>
                    <td class="pulse">${entry.pulse || '—'}</td>
                    <td class="note">${entry.note || ''}</td>
                    <td class="actions">
                        <button class="edit" onclick="editEntry(${entry.id})">✎</button>
                        <button class="del" onclick="deleteEntry(${entry.id})">✕</button>
                    </td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
    }

    // ----- Модалка -----
    function showModal(entry = null) {
        const modal = document.getElementById('modal');
        const title = document.getElementById('modalTitle');
        const inputDate = document.getElementById('inputDate');
        const inputMorning = document.getElementById('inputMorning');
        const inputEvening = document.getElementById('inputEvening');
        const inputPulse = document.getElementById('inputPulse');
        const inputNote = document.getElementById('inputNote');
        const deleteBtn = document.getElementById('deleteBtn');

        if (entry) {
            title.textContent = 'Редактировать запись';
            inputDate.value = entry.date;
            inputMorning.value = entry.morning || '';
            inputEvening.value = entry.evening || '';
            inputPulse.value = entry.pulse || '';
            inputNote.value = entry.note || '';
            deleteBtn.style.display = 'block';
            editingId = entry.id;
        } else {
            title.textContent = 'Добавить запись';
            const today = new Date().toISOString().split('T')[0];
            inputDate.value = today;
            inputMorning.value = '';
            inputEvening.value = '';
            inputPulse.value = '';
            inputNote.value = '';
            deleteBtn.style.display = 'none';
            editingId = null;
        }
        modal.classList.add('show');
    }

    function hideModal() {
        document.getElementById('modal').classList.remove('show');
        editingId = null;
    }

    function saveModal() {
        const date = document.getElementById('inputDate').value;
        const morning = document.getElementById('inputMorning').value.trim();
        const evening = document.getElementById('inputEvening').value.trim();
        const pulse = parseInt(document.getElementById('inputPulse').value);
        const note = document.getElementById('inputNote').value.trim();

        if (!date) {
            alert('Выберите дату');
            return;
        }
        if (!morning && !evening) {
            alert('Введите хотя бы одно давление (утро или вечер)');
            return;
        }

        const entryData = {
            date, morning, evening,
            pulse: isNaN(pulse) ? '' : pulse,
            note
        };

        if (editingId !== null) {
            const index = entries.findIndex(e => e.id === editingId);
            if (index !== -1) {
                entries[index] = { ...entries[index], ...entryData };
            }
        } else {
            const newEntry = { id: Date.now(), ...entryData };
            entries.push(newEntry);
        }
        saveData();
        render();
        hideModal();
    }

    function deleteEntry(id) {
        if (confirm('Удалить запись?')) {
            entries = entries.filter(e => e.id !== id);
            saveData();
            render();
        }
    }

    function editEntry(id) {
        const entry = entries.find(e => e.id === id);
        if (entry) showModal(entry);
    }

    // ----- События -----
    document.getElementById('addBtn').addEventListener('click', () => showModal(null));
    document.getElementById('saveBtn').addEventListener('click', saveModal);
    document.getElementById('cancelBtn').addEventListener('click', hideModal);
    document.getElementById('deleteBtn').addEventListener('click', function() {
        if (editingId !== null) {
            deleteEntry(editingId);
            hideModal();
        }
    });

    // Инициализация
    loadData();
    render();
</script>
</body>
</html>
